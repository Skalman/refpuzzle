<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<style>@media (max-width: 47px) { .heads { display: none; } .arcs { stroke-width: 4.5; } }</style>
  <style>
    .tip-circles { display: none; }
    .arcs-ext { display: none; }
    @media (max-width: 47px) { .heads { display: none; } .arcs { display: none; } .arcs-ext { display: block; stroke-width: 8; } .tip-circles { display: block; } .dots circle { fill: white; animation: none; } }
    .arcs path { stroke-dasharray: 80; stroke-dashoffset: 80;
      animation: draw 1.0s ease-out var(--d) forwards, towhite-stroke 0.7s ease 0.8s forwards; }
    .heads polygon { opacity: 0; transform: scale(0);
      animation: pophead 0.25s ease-out var(--d) forwards, towhite-fill 0.7s ease 0.8s forwards; }
    .dots circle { animation: pulse 2s ease-in-out var(--d) 2, towhite-fill 0.7s ease 0.8s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes pophead { to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    .dots.once circle { animation: pulse 2s ease-in-out 1; animation-delay: var(--d); fill: white; }
    .dots.no-anim circle { animation: none; }
    @keyframes towhite-stroke { to { stroke: white; } }
    @keyframes towhite-fill { to { fill: white; } }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var running = true;
      var dotsG = document.querySelector(".dots");
      var lastDot = dotsG.querySelector("circle:last-child");
      lastDot.addEventListener("animationend", function(e) {
        if (e.animationName === "pulse") running = false;
      });
      function restart() {
        if (running) return;
        running = true;
        dotsG.classList.add("no-anim", "once");
        dotsG.getBBox();
        dotsG.classList.remove("no-anim");
      }
      document.documentElement.addEventListener("mouseenter", restart);
      document.documentElement.addEventListener("click", restart);
    });
  </script>
  <rect width="100" height="100" rx="20" fill="#6366f1"/>
  <g stroke-width="3" stroke-linecap="round" fill="none" class="arcs">
    <path style="--d:0s" d="M22.0,28.0 A60,60 0 0,1 47.4,18.8" stroke="#ff4d94"/>
    <path style="--d:0.15s" d="M75.0,22.0 A60,60 0 0,1 77.8,49.0" stroke="#00d4ff"/>
    <path style="--d:0.3s" d="M68.0,75.0 A60,60 0 0,1 33.5,53.2" stroke="#ffe014"/>
    <path style="--d:0.45s" d="M24.0,78.0 A60,60 0 0,1 17.7,55.4" stroke="#00e676"/>
  </g>
  <g stroke="white" stroke-width="3" stroke-linecap="round" fill="none" class="arcs-ext">
    <path d="M22.0,28.0 A60,60 0 0,1 54.9,18.4"/>
    <path d="M75.0,22.0 A60,60 0 0,1 76.4,56.4"/>
    <path d="M68.0,75.0 A60,60 0 0,1 29.3,47.1"/>
    <path d="M24.0,78.0 A60,60 0 0,1 17.6,47.9"/>
  </g>
  <g class="heads">
    <polygon style="--d:0.25s; transform-origin:54.9px 18.4px" points="62.4,18.9 47.5,12.3 47.4,25.3" fill="#ff4d94"/>
    <polygon style="--d:0.4s; transform-origin:76.4px 56.4px" points="74.0,63.5 84.1,50.6 71.5,47.4" fill="#00d4ff"/>
    <polygon style="--d:0.55s; transform-origin:29.3px 47.1px" points="25.9,40.4 27.9,56.6 39.1,49.9" fill="#ffe014"/>
    <polygon style="--d:0.7s; transform-origin:17.6px 47.9px" points="18.4,40.5 11.2,55.1 24.2,55.7" fill="#00e676"/>
  </g>
  <g fill="white" class="tip-circles">
    <circle cx="54.9" cy="18.4" r="5"/>
    <circle cx="76.4" cy="56.4" r="5"/>
    <circle cx="29.3" cy="47.1" r="5"/>
    <circle cx="17.6" cy="47.9" r="5"/>
  </g>
  <g class="dots">
    <circle cx="22" cy="28" r="5" fill="#ff4d94" style="--d:0s; transform-origin:22px 28px"/>
    <circle cx="75" cy="22" r="5" fill="#00d4ff" style="--d:0.5s; transform-origin:75px 22px"/>
    <circle cx="68" cy="75" r="5" fill="#ffe014" style="--d:1s; transform-origin:68px 75px"/>
    <circle cx="24" cy="78" r="5" fill="#00e676" style="--d:1.5s; transform-origin:24px 78px"/>
  </g>
</svg>
