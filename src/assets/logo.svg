<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<style>@media (max-width: 47px) { .heads { display: none; } .arcs { stroke-width: 4.5; } }</style>
  <style>
    .tip-circles { display: none; }
    .arcs-ext { display: none; }
    @media (max-width: 47px) { .heads { display: none; } .arcs { display: none; } .arcs-ext { display: block; stroke-width: 8; } .tip-circles { display: block; } .dots circle { fill: white; animation: none; } }
    .arcs path { stroke-dasharray: 80; stroke-dashoffset: 80;
      animation: draw 1.0s ease-out var(--d) forwards, towhite-stroke 0.7s ease 0.8s forwards; }
    .heads polygon { opacity: 0; transform: scale(0);
      animation: pophead 0.25s ease-out var(--d) forwards, towhite-fill 0.7s ease 0.8s forwards; }
    .dots circle { animation: towhite-fill 0.7s ease 0.8s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes pophead { to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    @keyframes towhite-stroke { to { stroke: white; } }
    @keyframes towhite-fill { to { fill: white; } }
    .replay .arcs path,
    .replay .heads polygon,
    .replay .dots circle { animation: none; }
  </style>
  <rect width="100" height="100" rx="20" fill="#6366f1"/>
  <g stroke-width="4.5" stroke-linecap="round" fill="none" class="arcs">
    <path style="--d:0s" d="M22.0,28.0 A60,60 0 0,1 45.5,19.1" stroke="#ff66c4"/>
    <path style="--d:0.15s" d="M75.0,22.0 A60,60 0 0,1 78.0,47.0" stroke="#00d4ff"/>
    <path style="--d:0.3s" d="M68.0,75.0 A75,75 0 0,1 36.8,53.8" stroke="#ffe866"/>
    <path style="--d:0.45s" d="M24.0,78.0 A60,60 0 0,1 17.9,57.4" stroke="#00e676"/>
  </g>
  <g stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" class="arcs-ext">
    <path d="M22.0,28.0 A60,60 0 0,1 52.9,18.4"/>
    <path d="M75.0,22.0 A60,60 0 0,1 76.8,54.4"/>
    <path d="M68.0,75.0 A75,75 0 0,1 32.2,48.0"/>
    <path d="M24.0,78.0 A60,60 0 0,1 17.5,49.9"/>
  </g>
  <g class="heads">
    <polygon style="--d:0.25s; transform-origin:52.9px 18.4px" points="60.4,18.7 45.3,11.6 45.7,26.6" fill="#ff66c4"/>
    <polygon style="--d:0.4s; transform-origin:76.8px 54.4px" points="74.7,61.6 85.3,48.7 70.7,45.4" fill="#00d4ff"/>
    <polygon style="--d:0.55s; transform-origin:32.2px 48.0px" points="28.1,41.7 30.7,58.2 42.9,49.5" fill="#ffe866"/>
    <polygon style="--d:0.7s; transform-origin:17.5px 49.9px" points="18.1,42.4 10.4,57.3 25.4,57.5" fill="#00e676"/>
  </g>
  <g fill="white" class="tip-circles">
    <circle cx="52.9" cy="18.4" r="7"/>
    <circle cx="76.8" cy="54.4" r="7"/>
    <circle cx="32.2" cy="48.0" r="7"/>
    <circle cx="17.5" cy="49.9" r="7"/>
  </g>
  <g class="dots">
    <circle cx="22" cy="28" r="7" fill="#ff66c4" style="--d:0s; transform-origin:22px 28px"/>
    <circle cx="75" cy="22" r="7" fill="#00d4ff" style="--d:0.5s; transform-origin:75px 22px"/>
    <circle cx="68" cy="75" r="7" fill="#ffe866" style="--d:1s; transform-origin:68px 75px"/>
    <circle cx="24" cy="78" r="7" fill="#00e676" style="--d:1.5s; transform-origin:24px 78px"/>
  </g>
</svg>
